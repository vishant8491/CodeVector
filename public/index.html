<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product Browser</title>
<style>
  * { box-sizing: border-box; font-family: -apple-system, sans-serif; }
  body { margin: 0; background: #f8fafc; color: #1e293b; }
  .container { max-width: 900px; margin: 0 auto; padding: 24px; }
  h1 { font-size: 22px; margin-bottom: 4px; }
  .subtitle { color: #64748b; font-size: 13px; margin-bottom: 20px; }
  .controls { display: flex; gap: 10px; margin-bottom: 16px; }
  input[type="text"] {
    padding: 9px 14px; border: 1px solid #cbd5e1; border-radius: 8px;
    font-size: 14px; flex: 1; max-width: 320px;
  }
  select, button {
    padding: 9px 14px; border: 1px solid #cbd5e1; border-radius: 8px;
    font-size: 14px; background: white; cursor: pointer;
  }
  button { background: #4f46e5; color: white; border: none; font-weight: 600; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; border: 1px solid #e2e8f0; }
  th { text-align: left; padding: 10px 14px; background: #f1f5f9; font-size: 12px; color: #64748b; text-transform: uppercase; }
  td { padding: 10px 14px; border-top: 1px solid #e2e8f0; font-size: 14px; }
  .pagination { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; }
  .status { font-size: 13px; color: #64748b; }
</style>
</head>
<body>
<div class="container">
  <h1>Product Browser</h1>
  <p class="subtitle">Browsing 200,000 products — newest first</p>

  <div class="controls">
    <input type="text" id="searchInput" placeholder="Search by name or category...">
    <select id="categoryFilter">
      <option value="">All Categories</option>
    </select>
  </div>

  <table>
    <thead>
      <tr><th>Name</th><th>Category</th><th>Price</th><th>Created At</th></tr>
    </thead>
    <tbody id="productRows"></tbody>
  </table>

  <div class="pagination">
    <span class="status" id="status">Loading...</span>
    <button id="nextBtn">Next Page →</button>
  </div>
</div>

<script>
  const API_BASE = '/api/products';
  let cursorStack = [null]; // stack of cursors so we can know "current" cursor
  let currentCursor = null;
  let currentCategory = '';
  let currentSearch = '';
  let debounceTimer = null;

  async function loadCategories() {
    const res = await fetch(`${API_BASE}/categories`);
    const categories = await res.json();
    const select = document.getElementById('categoryFilter');
    categories.forEach(cat => {
      const opt = document.createElement('option');
      opt.value = cat;
      opt.textContent = cat;
      select.appendChild(opt);
    });
  }

  async function loadProducts(cursor) {
    document.getElementById('status').textContent = 'Loading...';
    const params = new URLSearchParams({ limit: 20 });
    if (cursor) params.set('cursor', cursor);
    if (currentCategory) params.set('category', currentCategory);
    if (currentSearch) params.set('search', currentSearch);

    const res = await fetch(`${API_BASE}?${params}`);
    const data = await res.json();

    const tbody = document.getElementById('productRows');

    if (data.products.length === 0) {
      tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#94a3b8; padding:24px;">No products match your search.</td></tr>`;
    } else {
      tbody.innerHTML = data.products.map(p => `
        <tr>
          <td>${escapeHtml(p.name)}</td>
          <td>${escapeHtml(p.category)}</td>
          <td>₹${p.price.toFixed(2)}</td>
          <td>${new Date(p.createdAt).toLocaleString()}</td>
        </tr>
      `).join('');
    }

    document.getElementById('nextBtn').disabled = !data.hasMore;
    document.getElementById('status').textContent = `Showing ${data.products.length} products`;

    return data.nextCursor;
  }

  // Basic HTML-escaping so product names/categories can't break the markup
  // or inject script tags — defensive, since this data ultimately came from
  // a seed script we control, but it's the right habit when rendering any
  // dynamic text into innerHTML.
  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function resetAndReload() {
    currentCursor = null;
    cursorStack = [null];
    loadProducts(null).then(next => { if (next) cursorStack.push(next); });
  }

  document.getElementById('nextBtn').addEventListener('click', async () => {
    const nextCursor = await loadProducts(currentCursor);
    if (nextCursor) {
      cursorStack.push(nextCursor);
      currentCursor = nextCursor;
    }
  });

  document.getElementById('categoryFilter').addEventListener('change', (e) => {
    currentCategory = e.target.value;
    resetAndReload();
  });

  // Debounced search: we wait 350ms after the user stops typing before
  // firing the request. Without this, every keystroke would trigger a
  // separate query against 200k documents — wasteful and makes the UI
  // feel laggy as responses race each other out of order.
  document.getElementById('searchInput').addEventListener('input', (e) => {
    clearTimeout(debounceTimer);
    const value = e.target.value;
    debounceTimer = setTimeout(() => {
      currentSearch = value.trim();
      resetAndReload();
    }, 350);
  });

  (async () => {
    await loadCategories();
    const next = await loadProducts(null);
    if (next) cursorStack.push(next);
  })();
</script>
</body>
</html>
